[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [
  { access = "read", path = "./" },
  { access = "write", path = "./deployments" }
]

[rpc_endpoints]
base = "${BASE_RPC_URL}"
