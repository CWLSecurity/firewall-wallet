name: Firewall Wallet CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Foundry version
        run: forge --version

      - name: Integrity check
        run: npm run integrity:check

      - name: Security static checks
        run: npm run security:static

      - name: Contracts full test suite
        run: npm run test:contracts

      - name: Smoke contracts suite
        run: npm run smoke:contracts
