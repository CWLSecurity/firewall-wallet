name: Firewall Wallet CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Foundry version
        run: forge --version

      - name: Integrity check
        run: npm run integrity:check

      - name: Contracts full test suite
        run: npm run test:contracts

      - name: Smoke contracts suite
        run: npm run smoke:contracts
